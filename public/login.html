<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Gabi — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 36px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      color: #1a1a2e;
    }

    input:focus {
      border-color: #6C63FF;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6C63FF, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-login:hover { opacity: 0.92; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: #fff0f0;
      color: #e53935;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🧠</div>
    <h1 class="login-title">Sistema Gabi</h1>
    <p class="login-subtitle">Consultório de Psicologia</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" placeholder="gabi" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
    </form>
  </div>

  <script>
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Erro ao fazer login';
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Erro de conexão com o servidor';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }
  </script>
</body>
</html>
